name: Cognitive Drawing Board Native CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify_native_engine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Local Repository Source Tracks
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment Runtime
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'  # CRITICAL: Must be 22 or higher for native node:sqlite

    - name: Launch Automated Headless Core Pipeline Verification Test
      # No 'npm install' or 'npm ci' required! Directly execute vanilla Node.js
      run: node index.js
