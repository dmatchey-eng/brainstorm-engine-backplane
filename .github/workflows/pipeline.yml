name: Cognitive Drawing Board Engine CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify_engine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Local Repository Source Tracks
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment Runtime
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Force Clean Package-Free Ingestion
      # FIXED: Added --no-package-lock to explicitly ignore out-of-sync website paths
      run: |
        npm config set registry https://npmjs.org
        npm install --no-package-lock

    - name: Execute Strict TypeScript Compilation Sweep
      run: npx tsc --noEmit

    - name: Launch Automated Headless Core Pipeline Verification Test
      run: npm test
